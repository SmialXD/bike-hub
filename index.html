<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Ride Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; }
        .container { width: 90%; max-width: 1000px; margin: 40px auto; }
        canvas { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; }
        button { background: #00adb5; border: none; color: white; padding: 12px 24px; 
                 border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #008c95; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Motorcycle Ride Data Analyzer</h2>
        <button id="loadRideBtn">Load Latest Ride Session</button>
        <canvas id="rideChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        // Chart.js instance tracking
        let rideChart;

        document.getElementById('loadRideBtn').addEventListener('click', async () => {
            try {
                // Point directly to where your ESP32 drops the completed log file
                const fileRef = ref(storage, 'rides/latest_ride.json');
                
                // Fetch the temporary cloud download link 
                const url = await getDownloadURL(fileRef);
                
                // Grab the file contents raw via fetch
                const response = await fetch(url);
                const rideData = await response.json(); // Array of elements: [{t: time, a: angle}]

                // Map data structures for Chart.js inputs
                const timestamps = rideData.map(point => `${point.t}ms`);
                const angles = rideData.map(point => point.a);

                renderChart(timestamps, angles);

            } catch (error) {
                console.error("Error loading ride profile:", error);
                alert("Failed to fetch ride profile. Ensure the ESP32 uploaded the data file successfully.");
            }
        });

        function renderChart(labels, dataPoints) {
            const ctx = document.getElementById('rideChart').getContext('2d');
            
            // Wipe out older chart instances to clear system memory before redrawing
            if (rideChart) { rideChart.destroy(); }

            rideChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Lean Angle Curve (°)',
                        data: dataPoints,
                        borderColor: '#00adb5',
                        backgroundColor: 'rgba(0, 173, 181, 0.1)',
                        borderWidth: 2,
                        pointRadius: 1, // Tiny data points so long track sessions aren't cluttered
                        tension: 0.1,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { min: -60, max: 60, grid: { color: '#333' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
