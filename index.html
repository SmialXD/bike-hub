<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Ride Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 600;
        }

        canvas {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        button {
            background: #00adb5;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #008c95;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Motorcycle Ride Data Analyzer</h2>
        <button id="loadRideBtn">Load Latest Ride Session</button>
        <canvas id="rideChart"></canvas>
    </div>

    <script type="module">
        import {initializeApp} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import {getDatabase, ref, get} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Your specific regional Web App configurations
        const firebaseConfig = {
            apiKey: "AIzaSyDcrSihHGEffYirqebyj-kd2IDX84i-b3A",
            authDomain: "bike-hub-f68b9.firebaseapp.com",
            databaseURL: "https://bike-hub-f68b9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bike-hub-f68b9",
            storageBucket: "bike-hub-f68b9.firebasestorage.app",
            messagingSenderId: "630028140072",
            appId: "1:630028140072:web:8a1c2ad6f9d6dfee1abf1d"
        };

        // Initialize Firebase services
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Track chart instance to clear memory on redraws
        let rideChart;

        document.getElementById('loadRideBtn').addEventListener('click', async () => {
            try {
                // Target the exact absolute key path where the ESP32 pushes data arrays
                const rideRef = ref(database, 'rides/latest_ride');

                // Fetch the snapshot packet
                const snapshot = await get(rideRef);

                if (snapshot.exists()) {
                    const jsonString = snapshot.val();

                    // Parse string array back into local JavaScript Objects
                    const rideData = JSON.parse(jsonString);

                    // Isolate keys into parallel arrays for Chart.js parsing mechanics
                    const timestamps = rideData.map(point => `${point.t}ms`);
                    const angles = rideData.map(point => point.a);

                    renderChart(timestamps, angles);
                } else {
                    alert("No data entry logged yet at path 'rides/latest_ride'. Complete an ESP32 record phase first.");
                }

            } catch (error) {
                console.error("Error communicating with Europe-West1 RTDB instance:", error);
                alert("Failed to read from the cloud node. Verify your API keys match the web app configuration.");
            }
        });

        function renderChart(labels, dataPoints) {
            const ctx = document.getElementById('rideChart').getContext('2d');

            // Wipe legacy instances out of memory buffer to allow clear frame redraw overlays
            if (rideChart) {rideChart.destroy();}

            rideChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Lean Angle Curve (°)',
                        data: dataPoints,
                        borderColor: '#00adb5',
                        backgroundColor: 'rgba(0, 173, 181, 0.1)',
                        borderWidth: 2.5,
                        pointRadius: 1, // Minimize visual density for multi-sample batches
                        tension: 0.2,   // Smooth variations out slightly
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            min: -60,
                            max: 60,
                            grid: {color: '#333333'},
                            ticks: {color: '#ffffff'}
                        },
                        x: {
                            grid: {display: false},
                            ticks: {color: '#ffffff', maxTicksLimit: 10} // Prevents timeline overlaps
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {color: '#ffffff'}
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
